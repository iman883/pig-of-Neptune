<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 生日快乐</title>

<style>

/* ===== 基础 ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ===== 页面居中 ===== */
body{
    height:100vh;
    margin:0;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    position:relative;

    background:url("https://raw.githubusercontent.com/iman883/pig-of-Neptune/main/pig-space1.png")
    no-repeat center top;

    background-size:cover;

    font-family:"Microsoft YaHei",sans-serif;
}

/* ===== 轻遮罩（不挡背景） ===== */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
}

/* ===== 卡片 ===== */
.pig-card{
    position:relative;
    z-index:2;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);

    border-radius:25px;
    padding:35px 45px;

    width:min(90%,500px);

    text-align:center;

    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    color:white;
}

/* ===== 标题 ===== */
h1{
    font-size:52px;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(255,255,255,0.6);
}

/* ===== 卡片内唯一一只猪 ===== */
.pig-face{
    font-size:100px;
    margin:15px 0;
    animation:bounce 2s infinite;
}

/* ===== 按钮 ===== */
.btn{
    margin-top:20px;
    padding:12px 28px;
    border:none;
    border-radius:50px;

    background:white;
    color:#ff4f81;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
}

/* ===== 动画 ===== */
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

</style>
</head>

<body>

<!-- 卡片 -->
<div class="pig-card">

    <h1>🐷 生日快乐 🎂</h1>

    <!-- 只保留这一只猪 -->
    <div class="pig-face">👧</div>

    <button class="btn" onclick="alert('🎉 生日快乐！祝你天天开心 🐷💖')">
        点击领取祝福
    </button>

</div>

</body>
</html>
