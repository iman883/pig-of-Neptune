<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小猪星际生日宇宙</title>

<style>

/* =========================
   🌌 全局背景（统一深蓝，不用黑）
========================= */
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;

    background:
        radial-gradient(circle at 20% 20%, #2a3f7a 0%, transparent 45%),
        radial-gradient(circle at 80% 60%, #243a6b 0%, transparent 50%),
        linear-gradient(180deg,#1b2b55,#162244,#1a2a4d);

    color:white;
}

/* =========================
   ✨ 星云柔光层
========================= */
.nebula{
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 30% 40%, rgba(120,160,255,0.18), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(255,140,200,0.10), transparent 60%);
    filter:blur(60px);
}

/* =========================
   ✨ 星星层（柔和蓝白）
========================= */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:rgba(255,255,255,0.8);
    border-radius:50%;
    animation:twinkle 2.5s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;transform:scale(0.8);}
    to{opacity:1;transform:scale(1.4);}
}

/* =========================
   🌍 星球（蓝紫渐变）
========================= */
.planet{
    position:absolute;
    width:260px;
    height:260px;
    border-radius:50%;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);

    background:
        radial-gradient(circle at 30% 30%, #7fb2ff, #3b5aa3 60%, #1b2a55);

    box-shadow:
        0 0 50px rgba(120,170,255,0.25),
        inset -20px -20px 60px rgba(0,0,0,0.2);

    animation:float 6s ease-in-out infinite;
}

/* 漂浮 */
@keyframes float{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-10px);}
}

/* =========================
   🌙 星球光环
========================= */
.ring{
    position:absolute;
    width:360px;
    height:120px;
    left:50%;
    bottom:200px;
    transform:translateX(-50%) rotateX(70deg);

    border:2px solid rgba(160,200,255,0.25);
    border-radius:50%;
    filter:blur(1px);
}

/* =========================
   🐷 小猪轨道
========================= */
.orbit{
    position:absolute;
    width:380px;
    height:380px;
    left:50%;
    bottom:140px;
    transform:translateX(-50%);
    animation:spin 14s linear infinite;
}

@keyframes spin{
    100%{transform:translateX(-50%) rotate(360deg);}
}

/* =========================
   🐷 呆萌小猪（核心升级）
========================= */
.pig{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    animation:bounce 2.5s ease-in-out infinite;
}

/* 王冠 */
.crown{
    text-align:center;
    font-size:22px;
    margin-bottom:-6px;
    filter:drop-shadow(0 0 6px rgba(255,255,255,0.4));
}

/* 猪头 */
.pig-head{
    width:70px;
    height:70px;
    background:#ffb6c8;
    border-radius:50%;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* 耳朵 */
.ear{
    width:16px;
    height:16px;
    background:#ff9bb2;
    position:absolute;
    top:-5px;
    border-radius:50%;
}

.ear.left{left:6px;transform:rotate(-20deg);}
.ear.right{right:6px;transform:rotate(20deg);}

/* 眼睛 */
.eye{
    width:6px;
    height:6px;
    background:#1a1a1a;
    border-radius:50%;
    position:absolute;
    top:24px;
}

.eye.left{left:18px;}
.eye.right{right:18px;}

/* 鼻子 */
.nose{
    width:22px;
    height:14px;
    background:#ff7f9f;
    border-radius:10px;
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
}

/* 腮红（高级感关键） */
.blush{
    width:10px;
    height:6px;
    background:rgba(255,120,160,0.35);
    border-radius:50%;
    position:absolute;
    top:32px;
}

.blush.left{left:6px;}
.blush.right{right:6px;}

/* 浮动 */
@keyframes bounce{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-10px);}
}

/* =========================
   🧠 UI
========================= */
.ui{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;
}

.title{
    font-size:44px;
    font-weight:bold;
    text-shadow:0 0 18px rgba(180,220,255,0.4);
}

.sub{
    opacity:0.85;
    font-size:16px;
    margin-top:5px;
}

button{
    margin-top:12px;
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:#ffffff;
    color:#ff4f81;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<div class="nebula"></div>

<!-- UI -->
<div class="ui">
    <div class="title">🐷 小猪星际生日宇宙</div>
    <div class="sub">在温柔蓝色宇宙中漂流的生日奇迹</div>
    <button onclick="alert('💖 小猪给你一个宇宙级拥抱')">
        领取祝福
    </button>
</div>

<!-- 星球 -->
<div class="planet"></div>
<div class="ring"></div>

<!-- 小猪 -->
<div class="orbit">

    <div class="pig">

        <div class="crown">👑</div>

        <div class="pig-head">

            <div class="ear left"></div>
            <div class="ear right"></div>

            <div class="eye left"></div>
            <div class="eye right"></div>

            <div class="nose"></div>

            <div class="blush left"></div>
            <div class="blush right"></div>

        </div>

    </div>

</div>

<script>

/* ===== 星星生成（统一蓝白色调） ===== */
for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";

    let size=Math.random()*2.5;

    s.style.width=size+"px";
    s.style.height=size+"px";

    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";

    s.style.opacity=Math.random()*0.8;

    document.body.appendChild(s);
}

</script>

</body>
</html>
