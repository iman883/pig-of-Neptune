<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 小猪生日快乐</title>

<style>

/* =====================
   基础
===================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:url("https://raw.githubusercontent.com/iman883/pig-of-Neptune/main/pig-space1.png")
    no-repeat center top;

    background-size:cover;
    font-family:"Microsoft YaHei",sans-serif;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
}

/* =====================
   卡片
===================== */
.card{
    position:relative;
    z-index:2;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);

    border-radius:25px;
    padding:35px 45px;

    text-align:center;
    color:white;
}

h1{
    font-size:52px;
    margin-bottom:20px;
}

.btn{
    margin:8px;
    padding:12px 26px;

    border:none;
    border-radius:50px;

    background:white;
    color:#ff4f81;

    font-weight:bold;
    cursor:pointer;
}

/* =====================
   吃蛋糕动画（完全不动）
===================== */
.overlay{
    position:fixed;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.4);
    z-index:999;
}

.anim-box{
    text-align:center;
    color:white;
}

.girl{
    font-size:90px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

.cake{
    font-size:80px;
    margin-top:10px;
}

.age{
    margin-top:20px;
    font-size:28px;
    opacity:0;
    transition:0.5s;
}

/* =====================
   游戏
===================== */
#game{
    position:fixed;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,40,0.65);
    z-index:9999;
}

.box{
    width:90%;
    max-width:700px;
    height:320px;

    background:rgba(255,255,255,0.12);
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
}

/* 地面 */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:50px;
    background:rgba(255,255,255,0.12);
}

/* 猪 */
#pig{
    position:absolute;
    left:80px;
    bottom:50px;
    font-size:55px;
}

/* 障碍（关键：left控制） */
#obs{
    position:absolute;
    left:800px;
    bottom:50px;
    font-size:45px;
}

/* 跳跃 */
.jump{
    animation:jump 0.7s ease;
}

@keyframes jump{
    0%{bottom:50px;}
    50%{bottom:170px;}
    100%{bottom:50px;}
}

/* =====================
   结算
===================== */
.result-screen{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.45);
    z-index:999999;
}

.result-box{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);

    padding:40px 50px;
    border-radius:25px;

    text-align:center;
    color:white;
}

.result-title{
    font-size:40px;
    margin-bottom:10px;
}

.restart-btn{
    margin-top:20px;
    padding:10px 25px;

    border:none;
    border-radius:50px;

    background:white;
    color:#ff4f81;

    font-weight:bold;
    cursor:pointer;
}
   
/* =====================
   偷看猪
===================== */
#peek{
    position:fixed;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.55);
    z-index:999999;
}

.peek-box{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);

    padding:35px 45px;
    border-radius:25px;

    text-align:center;
    color:white;

    width:min(90%,500px);

    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.peek-box img{
    width:320px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* =====================
   emoji雨（关键）
===================== */
.fall{
    position:fixed;
    top:-50px;
    font-size:24px;
    pointer-events:none;
    z-index:1;
}

</style>
</head>

<body>

<!-- =====================
   主界面（不动）
===================== -->
<div class="card">

    <h1>🐷 生日快乐 🎉</h1>

    <div class="cake">🎂</div>

    <button class="btn" onclick="startAnim()">😋吃蛋糕</button>
    <button class="btn" onclick="startGame()">🐷 猪突猛进</button>
    <button class="btn" onclick="peekPig()">👀 偷看猪</button>

</div>

<!-- =====================
   吃蛋糕（不动）
===================== -->
<div class="overlay" id="overlay">

    <div class="anim-box">

        <div class="girl">👧</div>
        <div class="cake">🍰</div>

        <div class="age" id="ageText">
            🎉 么么！变大一岁啦 ( •̀ ω •́ )✧
        </div>

    </div>

</div>

<!-- =====================
   游戏
===================== -->
<div id="game">

    <div class="box">

        <div id="ui">HP:5 ｜ 躲避:0/10</div>

        <div id="pig">🐷</div>
        <div id="obs">🌵</div>

        <div class="ground"></div>

    </div>

</div>

<!-- =====================
   偷看猪
===================== -->
<div id="peek">

    <div class="peek-box">

        <img id="peekImg">
        <div id="peekText" style="margin-top:15px;"></div>

        <button class="btn" onclick="closePeek()">关闭</button>

    </div>

</div>

<script>

/* =====================
   吃蛋糕（原样保留）
===================== */
function startAnim(){

    const overlay=document.getElementById("overlay");
    const ageText=document.getElementById("ageText");

    overlay.style.display="flex";

    setTimeout(()=>{

        ageText.style.opacity="1";

        for(let i=0;i<25;i++){

            let kiss=document.createElement("div");

            kiss.innerHTML=Math.random()>0.5?"💋":"😘";

            kiss.style.position="fixed";
            kiss.style.left="50%";
            kiss.style.top="50%";

            kiss.style.fontSize=(20+Math.random()*30)+"px";
            kiss.style.zIndex=9999;

            document.body.appendChild(kiss);

            let x=(Math.random()-0.5)*800;
            let y=(Math.random()-0.5)*600;

            setTimeout(()=>{

                kiss.style.transition="all 1.8s ease-out";
                kiss.style.transform=`translate(${x}px,${y}px)`;
                kiss.style.opacity="0";

            },50);

            setTimeout(()=>kiss.remove(),1800);
        }

    },1000);

    setTimeout(()=>{
        overlay.style.display="none";
        ageText.style.opacity="0";
    },3500);
}

/* =====================
   游戏（完全修复版）
===================== */

let hp=5;
let count=0;

let jumping=false;
let running=false;

/* ⭐ 关键：left控制 */
let obsX=800;
let speed=8;
let timer;

const list=["🌵","☄️","🪐","👾","🛰️","🌙"];

/* 随机障碍 */
function randomObs(){
    document.getElementById("obs").innerHTML =
        list[Math.floor(Math.random()*list.length)];
}

/* 开始 */
function startGame(){

    document.getElementById("game").style.display="flex";

    hp=5;
    count=0;
    obsX=800;
    speed=8;

    running=true;

    randomObs();
    update();

    clearInterval(timer);
    timer=setInterval(loop,20);

    document.onkeydown=(e)=>{
        if(e.code==="Space") jump();
    };

    document.getElementById("game").onclick=jump;
}

/* 跳跃 */
function jump(){

    if(jumping||!running) return;

    jumping=true;

    const pig=document.getElementById("pig");

    pig.classList.add("jump");

    setTimeout(()=>{
        pig.classList.remove("jump");
        jumping=false;
    },700);
}

/* 主循环（核心修复） */
function loop(){

    if(!running) return;

    const obs=document.getElementById("obs");
    const pig=document.getElementById("pig");

    /* 从右往左 */
    obsX -= speed;
    obs.style.left = obsX + "px";

    const p=pig.getBoundingClientRect();
    const o=obs.getBoundingClientRect();

    /* 碰撞 */
    let hit =
        p.right>o.left+10 &&
        p.left<o.right-10 &&
        p.bottom>o.top+10;

    if(hit){

        hp--;
        update();

        obsX=800;
        randomObs();

        if(hp<=0) end(false);

        return;
    }

    /* 成功通过（关键修复） */
    if(obsX < -80){

        count++;
        update();

        obsX=800;
        randomObs();

        if(count>=10) end(true);
    }
}

/* UI */
function update(){
    document.getElementById("ui").innerText =
        `HP:${hp} ｜ 躲避:${count}/10`;
}

/* 结算 */
function end(win){

    running=false;
    clearInterval(timer);

    let screen=document.createElement("div");
    screen.className="result-screen";

    screen.innerHTML=`
        <div class="result-box">

            <div class="result-title">
                ${win?"🎉 老公真棒！(～￣▽￣)～":"💥 别灰心，在猪里也算天才！(ToT)/~~~"}
            </div>

            <button class="restart-btn"
                onclick="location.reload()">
                再来
            </button>

        </div>
    `;

    document.body.appendChild(screen);

    for(let i=0;i<(win?80:40);i++){

        let e=document.createElement("div");

        e.innerHTML=win?"✨":"💥";

        e.style.position="fixed";
        e.style.left="50%";
        e.style.top="50%";
        e.style.fontSize="24px";

        document.body.appendChild(e);

        let x=(Math.random()-0.5)*1000;
        let y=(Math.random()-0.5)*700;

        setTimeout(()=>{

            e.style.transition="all 2s ease-out";
            e.style.transform=`translate(${x}px,${y}px)`;
            e.style.opacity="0";

        },50);

        setTimeout(()=>e.remove(),2000);
    }
}

/* =====================
   偷看猪
===================== */
const pigGallery=[
  {img:"pig-class.png",text:"努力学习势必考上吉大"},
  {img:"pig-game.png",text:"休闲一刻"},
  {img:"pig-sea.png",text:"来深圳海边了"},
  {img:"pig-shopping.png",text:"周末进城扫货"},
  {img:"pig-show.png",text:"来看老木演唱会"},
  {img:"pig-sleep.png",text:"猪之深度睡眠"},
  {img:"pig-unv.png",text:"吉大上早八"},
  {img:"pig-work.png",text:"上班摸鱼"}
];

function peekPig(){

    let data=pigGallery[Math.floor(Math.random()*pigGallery.length)];

    document.getElementById("peekImg").src=data.img;
    document.getElementById("peekText").innerText=data.text;

    document.getElementById("peek").style.display="flex";
}

function closePeek(){
    document.getElementById("peek").style.display="none";
}

/* =====================
   🌟 emoji雨
===================== */
const emojis=["🐷","💖","💕","✨","💗"];

setInterval(()=>{

    let e=document.createElement("div");
    e.classList.add("fall");

    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];

    e.style.left=Math.random()*100+"vw";

    document.body.appendChild(e);

    let duration=3000+Math.random()*3000;

    e.animate([
        {transform:"translateY(0px)",opacity:1},
        {transform:"translateY(110vh)",opacity:0}
    ],{
        duration:duration,
        easing:"linear"
    });

    setTimeout(()=>e.remove(),duration);

},200);

</script>

</body>
</html>
