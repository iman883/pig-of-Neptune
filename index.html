<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 生日快乐</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ===== 背景 ===== */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:url("https://raw.githubusercontent.com/iman883/pig-of-Neptune/main/pig-space1.png")
    no-repeat center top;
    background-size:cover;

    font-family:"Microsoft YaHei",sans-serif;
}

/* 遮罩 */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
}

/* ===== 卡片 ===== */
.card{
    position:relative;
    z-index:2;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);

    border-radius:25px;
    padding:35px 45px;

    width:min(90%,500px);

    text-align:center;

    color:white;
}

/* 标题 */
h1{
    font-size:52px;
    margin-bottom:20px;
}

/* 小女孩 */
.girl{
    font-size:90px;
    margin:10px 0;
    animation:bounce 2s infinite;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:12px 28px;
    border:none;
    border-radius:50px;

    background:white;
    color:#ff4f81;

    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* 动画 */
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* ===== 弹出动画层 ===== */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.4);
    z-index:999;
}

/* 动画盒子 */
.anim-box{
    text-align:center;
    color:white;
    font-size:40px;
}

/* 猪 */
.pig{
    font-size:120px;
    animation:eat 2s infinite;
}

/* 蛋糕 */
.cake{
    font-size:80px;
    margin-top:10px;
}

/* 吃东西动画 */
@keyframes eat{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px) scale(1.1);}
    100%{transform:translateY(0);}
}

/* +1岁提示 */
.age{
    margin-top:20px;
    font-size:28px;
    opacity:0;
    transition:0.5s;
}

</style>
</head>

<body>

<!-- 主卡片 -->
<div class="card">

    <h1>🐽 生日快乐 🎉</h1>

    <div class="cake">🎂</div>

    <button class="btn" onclick="startAnim()">
        吃蛋糕
    </button>

</div>

<!-- 动画层 -->
<div class="overlay" id="overlay">

    <div class="anim-box">

        <div class="girl">👧</div>
        <div class="cake">🍰</div>

        <div class="age" id="ageText">🎉 么么！变大一岁啦 ( •̀ ω •́ )✧</div>

    </div>

</div>

<script>

function startAnim(){

    const overlay=document.getElementById("overlay");
    const ageText=document.getElementById("ageText");

    // 显示动画层（吃蛋糕）
    overlay.style.display="flex";

    // =========================
    // 🎂 +1岁出现 + 💖亲亲特效（同一时间触发）
    // =========================
    setTimeout(()=>{

        // 显示 +1岁
        ageText.style.opacity="1";

        // =========================
        // 💋 亲亲雨特效（叠加，不加新文字框）
        // =========================
        for(let i=0;i<20;i++){

            const kissEmoji=document.createElement("div");

            kissEmoji.innerHTML = Math.random()>0.5 ? "💋" : "😘";

            kissEmoji.style.position="fixed";
            kissEmoji.style.left="50%";
            kissEmoji.style.top="50%";

            kissEmoji.style.fontSize=(20+Math.random()*30)+"px";
            kissEmoji.style.zIndex="9999";

            kissEmoji.style.transition="all 2s ease-out";

            document.body.appendChild(kissEmoji);

            const x=(Math.random()-0.5)*700;
            const y=(Math.random()-0.5)*500;

            setTimeout(()=>{
                kissEmoji.style.transform=
                    `translate(${x}px,${y}px) scale(2)`;
                kissEmoji.style.opacity="0";
            },50);

            setTimeout(()=>{
                kissEmoji.remove();
            },2000);
        }

    },1000);

    // =========================
    // ⏳ 自动关闭
    // =========================
    setTimeout(()=>{
        overlay.style.display="none";
        ageText.style.opacity="0";
    },3500);
}
</script>

</body>
</html>
