<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 生日快乐</title>

<style>

/* =====================
   基础
===================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:url("https://raw.githubusercontent.com/iman883/pig-of-Neptune/main/pig-space1.png")
    no-repeat center top;

    background-size:cover;
    font-family:"Microsoft YaHei",sans-serif;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
}

/* =====================
   卡片
===================== */
.card{
    position:relative;
    z-index:2;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);

    border-radius:25px;
    padding:35px 45px;

    width:min(90%,500px);

    text-align:center;
    color:white;
}

h1{
    font-size:52px;
    margin-bottom:20px;
}

.btn{
    margin-top:20px;
    padding:12px 28px;

    border:none;
    border-radius:50px;

    background:white;
    color:#ff4f81;

    font-size:16px;
    font-weight:bold;
    cursor:pointer;

    margin:5px;
}

/* =====================
   吃蛋糕动画
===================== */
.overlay{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.4);

    z-index:999;
}

.anim-box{
    text-align:center;
    color:white;
    font-size:40px;
}

.girl{
    font-size:90px;
    animation:floatGirl 3s ease-in-out infinite;
}

@keyframes floatGirl{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}

.cake{
    font-size:80px;
    margin-top:10px;
}

.age{
    margin-top:20px;
    font-size:28px;

    opacity:0;
    transition:0.5s;
}

/* =====================
   🐷 跑酷游戏
===================== */
#game{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,40,0.65);

    z-index:9999;
}

.box{
    width:90%;
    max-width:700px;
    height:320px;

    background:rgba(255,255,255,0.12);

    border-radius:20px;

    position:relative;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:12px;
    width:100%;

    text-align:center;
    color:white;
    font-size:18px;
}

/* 地面 */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:50px;

    background:rgba(255,255,255,0.12);
}

/* 猪 */
#pig{
    position:absolute;
    left:80px;
    bottom:50px;

    font-size:55px;
}

/* 障碍 */
#obs{
    position:absolute;
    right:-60px;
    bottom:50px;

    font-size:45px;
}

/* 跳跃 */
.jump{
    animation:jump 0.7s ease;
}

@keyframes jump{

    0%{
        bottom:50px;
    }

    50%{
        bottom:170px;
    }

    100%{
        bottom:50px;
    }
}

</style>
</head>

<body>

<!-- =====================
   主卡片
===================== -->
<div class="card">

    <h1>🐽 生日快乐 🎉</h1>

    <div class="cake">🎂</div>

    <button class="btn" onclick="startAnim()">
        吃蛋糕
    </button>

    <button class="btn" onclick="startGame()">
        🐷 猪突猛进
    </button>

</div>

<!-- =====================
   吃蛋糕层
===================== -->
<div class="overlay" id="overlay">

    <div class="anim-box">

        <div class="girl">👧</div>

        <div class="cake">🍰</div>

        <div class="age" id="ageText">
            🎉 么么！变大一岁啦 ( •̀ ω •́ )✧
        </div>

    </div>

</div>

<!-- =====================
   🐷 跑酷游戏
===================== -->
<div id="game">

    <div class="box">

        <div id="ui">
            🐷 HP:10 ｜ 躲避:0/10
        </div>

        <div id="pig">🐷</div>

        <div id="obs">🪨</div>

        <div class="ground"></div>

    </div>

</div>

<script>

/* =====================
   🎂 吃蛋糕动画
===================== */
function startAnim(){

    const overlay=document.getElementById("overlay");
    const ageText=document.getElementById("ageText");

    overlay.style.display="flex";

    setTimeout(()=>{

        ageText.style.opacity="1";

        /* 💋 亲亲雨 */
        for(let i=0;i<25;i++){

            let kiss=document.createElement("div");

            kiss.innerHTML=
                Math.random()>0.5 ? "💋" : "😘";

            kiss.style.position="fixed";
            kiss.style.left="50%";
            kiss.style.top="50%";

            kiss.style.fontSize=
                (20+Math.random()*30)+"px";

            kiss.style.zIndex="9999";

            document.body.appendChild(kiss);

            let x=(Math.random()-0.5)*800;
            let y=(Math.random()-0.5)*600;

            setTimeout(()=>{

                kiss.style.transition=
                    "all 1.8s ease-out";

                kiss.style.transform=
                    `translate(${x}px,${y}px)`;

                kiss.style.opacity="0";

            },50);

            setTimeout(()=>{
                kiss.remove();
            },1800);
        }

    },1000);

    setTimeout(()=>{

        overlay.style.display="none";
        ageText.style.opacity="0";

    },3500);
}

/* =====================
   🐷 跑酷游戏
===================== */

let hp=10;
let count=0;

let jumping=false;
let gameStarted=false;

let obstacleX=700;

let gameLoopInterval;

/* =====================
   开始游戏
===================== */
function startGame(){

    document.getElementById("game").style.display="flex";

    hp=10;
    count=0;

    obstacleX=700;

    gameStarted=true;

    updateUI();

    const obs=document.getElementById("obs");
    obs.style.right="-60px";

    /* 防止重复开启 */
    clearInterval(gameLoopInterval);

    gameLoopInterval=setInterval(gameLoop,20);

    document.onkeydown=(e)=>{

        if(e.code==="Space"){
            jump();
        }
    };

    document.getElementById("game").onclick=jump;
}

/* =====================
   跳跃
===================== */
function jump(){

    if(jumping || !gameStarted) return;

    jumping=true;

    const pig=document.getElementById("pig");

    pig.classList.add("jump");

    setTimeout(()=>{

        pig.classList.remove("jump");

        jumping=false;

    },700);
}

/* =====================
   游戏主循环
===================== */
function gameLoop(){

    if(!gameStarted) return;

    const obs=document.getElementById("obs");
    const pig=document.getElementById("pig");

    /* 障碍移动 */
    obstacleX += 8;

    obs.style.right=obstacleX+"px";

    /* 获取位置 */
    const p=pig.getBoundingClientRect();
    const o=obs.getBoundingClientRect();

    /* =====================
       碰撞检测
    ===================== */
    let hit=

        p.right > o.left+10 &&
        p.left < o.right-10 &&
        p.bottom > o.top+10;

    if(hit){

        hp--;

        updateUI();

        /* 重置障碍 */
        obstacleX=-60;

        if(hp<=0){

            gameOver();
        }

        return;
    }

    /* =====================
       成功通过障碍
    ===================== */
    if(o.right < 0){

        count++;

        updateUI();

        obstacleX=-60;

        if(count>=10){

            winGame();
        }
    }
}

/* =====================
   UI更新
===================== */
function updateUI(){

    document.getElementById("ui").innerText=
        `🐷 HP:${hp} ｜ 躲避:${count}/10`;
}

/* =====================
   游戏失败
===================== */
function gameOver(){

    gameStarted=false;

    clearInterval(gameLoopInterval);

    alert("💥 小猪被创飞啦！");

    location.reload();
}

/* =====================
   游戏胜利
===================== */
function winGame(){

    gameStarted=false;

    clearInterval(gameLoopInterval);

    alert("🎉 小猪旅行成功！");

    location.reload();
}

</script>

</body>
</html>
