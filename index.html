<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 生日快乐小猪宇宙</title>

<style>

/* 基础 */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* 背景（关键已修复） */
body{
    background:url("https://raw.githubusercontent.com/iman883/pig-of-Neptune/main/pig-space1.png") no-repeat center top;
    background-size:cover;
    background-position:center 20%;
}

/* 遮罩，让文字清晰 */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.25);
    z-index:0;
}

/* 漂浮猪背景 */
.pig-bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:1;
}

.pig{
    position:absolute;
    font-size:35px;
    opacity:0.25;
    animation:floatPig linear infinite;
}

@keyframes floatPig{
    from{transform:translateY(110vh) rotate(0deg);}
    to{transform:translateY(-20vh) rotate(360deg);}
}

/* 主体 */
.container{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
}

/* 标题 */
h1{
    font-size:64px;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
    animation:float 3s ease-in-out infinite;
}

/* 卡片 */
.pig-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    border-radius:25px;

    padding:25px 30px;   /* 👈 变小卡片 */
    max-width:380px;     /* 👈 控制宽度 */
    width:90%;

    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* 猪 */
.pig-face{
    font-size:90px;
    margin-bottom:20px;
    animation:bounce 2s infinite;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:14px 36px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f81;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

/* 动画 */
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- 漂浮猪 -->
<div class="pig-bg"></div>

<!-- 内容 -->
<div class="container">

    <div class="pig-card">

        <h1>🐷 生日快乐 🎂</h1>

        <div class="pig-face">🐷</div>

        <div>祝你永远开心的小猪猪 💖</div>

        <button class="btn">生日快乐！</button>

    </div>

</div>

<script>

/* 漂浮猪 */
const pigBg=document.querySelector(".pig-bg");

for(let i=0;i<20;i++){

    const pig=document.createElement("div");
    pig.className="pig";
    pig.innerHTML="🐷";

    pig.style.left=Math.random()*100+"vw";
    pig.style.fontSize=(20+Math.random()*40)+"px";
    pig.style.animationDuration=(6+Math.random()*8)+"s";
    pig.style.animationDelay=Math.random()*5+"s";

    pigBg.appendChild(pig);
}

</script>

</body>
</html>
